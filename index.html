<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taksometr Pro</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }
        body {
            background-color: #f5f5f7;
            display: flex;
            flex-direction: column;
            height: 100vh;
            justify-content: space-between;
        }
        /* Yuqori qism */
        .header {
            background-color: #5188b8;
            color: white;
            padding: 15px;
            display: flex;
            align-items: center;
            font-size: 18px;
            font-weight: bold;
        }
        .header-menu { margin-right: 15px; font-size: 22px; cursor: pointer; }
        
        /* To'rtburchak rangli tugmalar */
        .top-buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            padding: 10px;
            background-color: #fff;
        }
        .btn-box {
            height: 60px;
            border-radius: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 24px;
        }
        .bg-green { background-color: #3b8b3e; }
        .bg-orange { background-color: #f1a100; }
        .bg-blue { background-color: #1976d2; }
        .bg-red { background-color: #d32f2f; }

        /* Manzil qismi */
        .address-box {
            background-color: #e0e0e6;
            margin: 10px;
            padding: 10px;
            border-radius: 5px;
            font-size: 14px;
            color: #666;
        }

        /* Asosiy Ekran - Katta Raqam */
        .main-fare {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 85px;
            font-weight: 700;
            color: #61a665;
            background-color: #fafafa;
        }

        /* Indikatorlar (Oshiqcha yuk, konditsioner va h.k.) */
        .indicators {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 2px;
            background-color: #ddd;
            padding: 2px 10px;
        }
        .ind-item {
            background-color: #e8e8f0;
            padding: 8px 2px;
            text-align: center;
            font-size: 9px;
            color: #888;
        }
        .ind-item span { display: block; font-size: 14px; margin-bottom: 2px; }

        /* Statistika paneli */
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 5px;
            padding: 10px;
            background-color: #fff;
        }
        .stat-card {
            background-color: #e8e8f0;
            padding: 10px;
            border-radius: 4px;
            display: flex;
            flex-direction: column;
        }
        .stat-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .stat-val {
            font-size: 22px;
            font-weight: bold;
            color: #111;
        }
        .stat-lbl {
            font-size: 14px;
            color: #555;
        }

        /* Pastki Asosiy Tugma */
        .action-btn {
            background-color: #1976d2;
            color: white;
            border: none;
            padding: 18px;
            font-size: 20px;
            font-weight: bold;
            text-align: center;
            cursor: pointer;
            width: 100%;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .action-btn.active {
            background-color: #d32f2f;
        }
    </style>
</head>
<body>

    <div class="header">
        <span class="header-menu">☰</span>
        <span>Buyurtma holati</span>
    </div>

    <div class="top-buttons">
        <div class="btn-box bg-green">📞</div>
        <div class="btn-box bg-orange">📍</div>
        <div class="btn-box bg-blue">⏱</div>
        <div class="btn-box bg-red">🚫</div>
    </div>

    <div class="address-box">
        <div>Manzil:</div>
        <strong id="gps-status">GPS kutilmoqda...</strong>
    </div>

    <div class="main-fare" id="fare-display">0</div>

    <div class="indicators">
        <div class="ind-item"><span>📦</span>Yuk</div>
        <div class="ind-item"><span>❄️</span>Kond.</div>
        <div class="ind-item"><span>🧳</span>Yukxona</div>
        <div class="ind-item"><span>🛞</span>Tom</div>
        <div class="ind-item"><span>🌧</span>Yomon havo</div>
        <div class="ind-item"><span>🛒</span>Etkazma</div>
    </div>

    <div class="stats-grid">
        <div class="stat-card">
            <div class="stat-row"><span class="stat-lbl">⚡ Tezlik:</span><span class="stat-val" id="speed">0 km/s</span></div>
        </div>
        <div class="stat-card">
            <div class="stat-row"><span class="stat-lbl">🛣 Masofa:</span><span class="stat-val" id="distance">0.0 km</span></div>
        </div>
        <div class="stat-card">
            <div class="stat-row"><span class="stat-lbl">⏱ Kutish:</span><span class="stat-val" id="wait-time">00:00</span></div>
        </div>
        <div class="stat-card">
            <div class="stat-row"><span class="stat-lbl">🚕 Umumiy:</span><span class="stat-val" id="total-time">00:00</span></div>
        </div>
    </div>

    <button class="action-btn" id="main-toggle-btn">Boshlash</button>

    <script>
        // Tariff sozlamalari
        const START_FARE = 20000;      // Boshlang'ich narx
        const PER_KM_FARE = 4000;      // 1 km uchun narx
        const PER_MIN_WAIT_FARE = 2000;// 1 daqiqa kutish uchun narx

        // O'zgaruvchilar
        let isRunning = false;
        let totalFare = 0;
        let totalDistance = 0; // kilometrda
        let totalWaitSeconds = 0;
        let totalSeconds = 0;
        
        let lastPosition = null;
        let watchId = null;
        let timerInterval = null;

        const mainBtn = document.getElementById('main-toggle-btn');
        const fareDisplay = document.getElementById('fare-display');
        const speedDisplay = document.getElementById('speed');
        const distanceDisplay = document.getElementById('distance');
        const waitDisplay = document.getElementById('wait-time');
        const gpsStatus = document.getElementById('gps-status');

        // Boshlash / Tugatish hodisasi
        mainBtn.addEventListener('click', () => {
            if (!isRunning) {
                startTrip();
            } else {
                stopTrip();
            }
        });

        function startTrip() {
            isRunning = true;
            mainBtn.textContent = "Buurtmani Yakunlash";
            mainBtn.classList.add('active');
            
            // Hisobni dastlabki 20 000 so'm bilan yuklash
            totalFare = START_FARE;
            totalDistance = 0;
            totalWaitSeconds = 0;
            totalSeconds = 0;
            lastPosition = null;
            
            updateUI();

            // GPS kuzatishni boshlash
            if (navigator.geolocation) {
                watchId = navigator.geolocation.watchPosition(updateLocation, handleGPSError, {
                    enableHighAccuracy: true,
                    maximumAge: 0,
                    timeout: 5000
                });
                gpsStatus.textContent = "Kuzatuv faol (GPS Yoqilgan)";
            } else {
                gpsStatus.textContent = "GPS qurilmangizda ishlamaydi";
            }

            // Har soniyada vaqt va kutishni hisoblovchi taymer
            timerInterval = setInterval(() => {
                totalSeconds++;
                
                // Agar tezlik juda past bo'lsa (yoki 0 bo'lsa), uni kutish vaqti deb hisoblaymiz
                // Bu erda joriy tezlikni tekshiramiz (metr/sekunddan km/soatga o'girilgan)
                let currentSpeed = lastPosition && lastPosition.coords.speed ? lastPosition.coords.speed * 3.6 : 0;
                
                if (currentSpeed < 2) { // 2 km/soatdan past bo'lsa to'xtagan deb hisoblaydi
                    totalWaitSeconds++;
                    // Daqiqasiga 2000 so'm -> 1 soniyaga (2000 / 60) so'm qo'shiladi
                    totalFare += (PER_MIN_WAIT_FARE / 60);
                }

                updateUI();
            }, 1000);
        }

        function stopTrip() {
            isRunning = false;
            mainBtn.textContent = "Boshlash";
            mainBtn.classList.remove('active');
            gpsStatus.textContent = "Kuzatuv to'xtatildi.";
            
            if (watchId) navigator.geolocation.clearWatch(watchId);
            if (timerInterval) clearInterval(timerInterval);
        }

        // GPS orqali koordinatalar o'zgarganda ishlaydi
        function updateLocation(position) {
            if (!isRunning) return;

            const currentCoords = position.coords;
            // Tezlikni hisoblash (km/soatda)
            let speedKmH = currentCoords.speed ? currentCoords.speed * 3.6 : 0;
            if (speedKmH < 0) speedKmH = 0;
            speedDisplay.textContent = `${speedKmH.toFixed(1)} km/s`;

            if (lastPosition) {
                const p1 = lastPosition.coords;
                const p2 = currentCoords;
                
                // Ikki nuqta orasidagi masofani hisoblash (Xaverinus formulasi)
                const distanceDelta = calculateDistance(p1.latitude, p1.longitude, p2.latitude, p2.longitude);
                
                // Agar tezlik harakatni ko'rsatsa masofani va pulni qo'shamiz
                if (speedKmH >= 2 && distanceDelta > 0.002) { // kamida 2 metr harakat bo'lishi kerak jalb qilmaslik uchun
                    totalDistance += distanceDelta;
                    totalFare += distanceDelta * PER_KM_FARE;
                }
            }

            lastPosition = position;
            updateUI();
        }

        // Ikki GPS nuqtasi orasidagi aniq masofani hisoblash funksiyasi (Kilometrlarda)
        function calculateDistance(lat1, lon1, lat2, lon2) {
            const R = 6371; // Er radiusi km
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat / 2) * Math.sin(dLat / 2) +
                      Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                      Math.sin(dLon / 2) * Math.sin(dLon / 2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
            return R * c;
        }

        function handleGPSError(error) {
            console.warn(`GPS Xatolik: ${error.message}`);
            gpsStatus.textContent = "GPS signali zaif yoki ruxsat berilmagan";
        }

        // Vaqt formatlash (00:00 ko'rinishida)
        function formatTime(seconds) {
            const mins = Math.floor(seconds / 60);
            const secs = seconds % 60;
            return `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
        }

        // Ekranni yangilash
        function updateUI() {
            // Pulni formatlash (Masalan: 47 000)
            fareDisplay.textContent = Math.round(totalFare).toLocaleString('uz-UZ').replace(/,/g, ' ');
            distanceDisplay.textContent = `${totalDistance.toFixed(1)} km`;
            waitDisplay.textContent = formatTime(totalWaitSeconds);
        }
    </script>
</body>
</html>
