<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Taksometr Pro Exact</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            user-select: none;
        }
        body {
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        
        /* Asosiy konteyner */
        .phone-container {
            width: 100%;
            max-width: 430px;
            height: 100vh;
            background-color: #f3f3f6;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            position: relative;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            overflow: hidden;
        }

        /* 1. HEADER (Suratdagi ko'k yuqori qism) */
        .header {
            background-color: #5188b8;
            color: white;
            padding: 18px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .header-left {
            display: flex;
            align-items: center;
            gap: 20px;
        }
        .menu-icon {
            width: 22px;
            height: 16px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            cursor: pointer;
        }
        .menu-icon div {
            height: 2.5px;
            background-color: white;
            border-radius: 1px;
        }
        .header-title {
            font-size: 23px;
            font-weight: 400;
            letter-spacing: 0.5px;
        }
        .header-right-toggle {
            width: 42px;
            height: 26px;
            background-color: #3b9dfa;
            border-radius: 13px;
        }

        /* 2. TOP ACTION BUTTONS (4 rangli kvadrat va ularning ichki belgilari) */
        .top-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            padding: 12px;
            background-color: #ffffff;
        }
        .top-btn {
            aspect-ratio: 1.15;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .btn-green { background-color: #388e3c; }
        .btn-orange { background-color: #ffa000; }
        .btn-blue { background-color: #1976d2; }
        .btn-red { background-color: #d32f2f; }
        .top-btn svg { width: 34px; height: 34px; fill: white; }

        /* 3. MANZIL PANEL */
        .address-panel {
            background-color: #e8e8f0;
            margin: 0 12px;
            padding: 8px 12px 12px 12px;
            border-radius: 4px;
            position: relative;
            cursor: pointer;
        }
        .address-panel:active { background-color: #dadae5; }
        .address-lbl {
            font-size: 14px;
            color: #8c8c96;
            margin-bottom: 2px;
        }
        .address-val {
            font-size: 16px;
            font-weight: bold;
            color: #333;
        }
        .arrow-up {
            position: absolute;
            right: 15px;
            bottom: 14px;
            width: 0; height: 0;
            border-left: 6px solid transparent;
            border-right: 6px solid transparent;
            border-bottom: 6px solid #000;
        }

        /* 4. ASOSIY HISOB (Yashil ulkan raqam) */
        .fare-area {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #ffffff;
        }
        .fare-number {
            font-size: 96px;
            font-weight: 700;
            color: #61a665;
            letter-spacing: -1px;
        }

        /* 5. TARIF OPTIONS (6 ta kichik kulrang katakchalar va rasmdagi haqiqiy ikonkalar) */
        .options-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 2px;
            padding: 0 12px;
            background-color: #ffffff;
        }
        .opt-box {
            background-color: #e8e8f0;
            padding: 8px 2px;
            text-align: center;
            color: #92929c;
            font-size: 9px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-weight: 500;
        }
        .opt-box svg { width: 24px; height: 24px; fill: #888892; margin-bottom: 4px; }

        /* 6. STATS PANEL (Tezlik, Masofa, Kutish va Pastki yo'l ikonasi) */
        .stats-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px;
            padding: 10px 12px;
            background-color: #ffffff;
        }
        .stat-box {
            background-color: #e8e8f0;
            padding: 8px 12px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .stat-icon { width: 26px; height: 26px; display: flex; align-items: center; }
        .stat-icon svg { width: 100%; height: 100%; fill: #f5a623; }
        .stat-info {
            display: flex;
            align-items: baseline;
            gap: 4px;
        }
        .stat-num { font-size: 26px; font-weight: bold; color: #111; }
        .stat-unit { font-size: 16px; font-weight: bold; color: #111; }

        /* 7. BOTTOM MAIN BUTTON */
        .main-action-btn {
            width: 100%;
            background-color: #1976d2;
            color: white;
            font-size: 22px;
            font-weight: 500;
            text-align: center;
            padding: 20px 0;
            border: none;
            outline: none;
            cursor: pointer;
            letter-spacing: 0.5px;
        }

        /* ZAGRUZKA (YUKLANISH) EFFEKTI */
        .loader-screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.85);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            color: white;
        }
        .circle-loader {
            width: 55px;
            height: 55px;
            border: 5px solid rgba(255, 255, 255, 0.2);
            border-top: 5px solid #3b9dfa;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 15px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .loader-text { font-size: 18px; font-weight: 400; letter-spacing: 0.5px; }
    </style>
</head>
<body>

    <div class="phone-container">
        <div>
            <div class="header">
                <div class="header-left">
                    <div class="menu-icon">
                        <div></div>
                        <div></div>
                        <div></div>
                    </div>
                    <div class="header-title" id="header-status-text">Бажарилди: 9/0/9</div>
                </div>
                <div class="header-right-toggle"></div>
            </div>

            <div class="top-grid">
                <div class="top-btn btn-green">
                    <svg viewBox="0 0 24 24"><path d="M20 15.5c-1.2 0-2.4-.2-3.6-.6-.3-.1-.7 0-1 .2l-2.2 2.2c-2.8-1.4-5.1-3.8-6.6-6.6l2.2-2.2c.3-.3.4-.7.2-1-.3-1.1-.5-2.3-.5-3.5 0-.6-.4-1-1-1H4c-.6 0-1 .4-1 1 0 9.4 7.6 17 17 17 .6 0 1-.4 1-1v-3.5c0-.6-.4-1-1-1zM12 3h10v10h-2V6.4l-6.3 6.3-1.4-1.4L18.6 5H12V3z"/></svg>
                </div>
                <div class="top-btn btn-orange">
                    <svg viewBox="0 0 24 24"><path d="M12 2C8.1 2 5 5.1 5 9c0 5.3 7 13 7 13s7-7.7 7-13c0-3.9-3.1-7-7-7zm0 9.5c-1.4 0-2.5-1.1-2.5-2.5s1.1-2.5 2.5-2.5 2.5 1.1 2.5 2.5-1.1 2.5-2.5 2.5z"/></svg>
                </div>
                <div class="top-btn btn-blue">
                    <svg viewBox="0 0 24 24"><path d="M15 1H9v2h6V1zm-3 5c-4.4 0-8 3.6-8 8s3.6 8 8 8 8-3.6 8-8-3.6-8-8-8zm0 14c-3.3 0-6-2.7-6-6s2.7-6 6-6 6 2.7 6 6-2.7 6-6 6zm1-9h-2v5l4.3 2.6.7-1.3-3.7-2.3V7z"/></svg>
                </div>
                <div class="top-btn btn-red">
                    <svg viewBox="0 0 24 24"><path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10 10-4.5 10-10S17.5 2 12 2zm0 18c-4.4 0-8-3.6-8-8 0-1.8.6-3.6 1.7-4.9l11.2 11.2c-1.3 1.1-3.1 1.7-4.9 1.7zm4.9-3.1L5.7 5.7C7 4.6 8.8 4 12 4c4.4 0 8 3.6 8 8 0 1.8-.6 3.6-1.7 4.9z"/></svg>
                </div>
            </div>

            <div class="address-panel" id="address-click-area">
                <div class="address-lbl">Манзил:</div>
                <div class="address-val" id="address-text">----</div>
                <div class="arrow-up"></div>
            </div>
        </div>

        <div class="fare-area">
            <div class="fare-number" id="fare-text">0</div>
        </div>

        <div>
            <div class="options-grid">
                <div class="opt-box"><svg viewBox="0 0 24 24"><path d="M19 8h-2v3h-3v2h3v3h2v-3h3v-2h-3zM12 8H4c-1.1 0-2 .9-2 2v8c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2v-8c0-1.1-.9-2-2-2zm0 10H4v-6h8v6z"/></svg>Ортиқча юк</div>
                <div class="opt-box"><svg viewBox="0 0 24 24"><path d="M22 11h-3V8c0-1.1-.9-2-2-2h-3V3c0-1.1-.9-2-2-2H8c-1.1 0-2 .9-2 2v3H3c-1.1 0-2 .9-2 2v3h3v10h16V11zm-4 8H6v-6h12v6z"/></svg>Кондиц.</div>
                <div class="opt-box"><svg viewBox="0 0 24 24"><path d="M17 6h-2V3c0-.5-.4-1-1-1h-4c-.5 0-1 .5-1 1v3H7c-1.1 0-2 .9-2 2v11c0 1.1.9 2 2 2h10c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2zM10 4h4v2h-4V4z"/></svg>Юкхона</div>
                <div class="opt-box"><svg viewBox="0 0 24 24"><path d="M18.9 6c-.2-.6-.8-1-1.4-1h-11c-.7 0-1.2.4-1.4 1L3 12v8c0 .6.4 1 1 1h1c.6 0 1-.4 1-1v-1h12v1c0 .6.4 1 1 1h1c.6 0 1-.4 1-1v-8l-2.1-6zM6.5 16c-.8 0-1.5-.7-1.5-1.5S5.7 13 6.5 13s1.5.7 1.5 1.5S7.3 16 6.5 16zm11 0c-.8 0-1.5-.7-1.5-1.5s.7-1.5 1.5-1.5 1.5.7 1.5 1.5-.7 1.5-1.5 1.5z"/></svg>Том багаж</div>
                <div class="opt-box"><svg viewBox="0 0 24 24"><path d="M19.4 10c-.7-3.4-3.7-6-7.4-6-2.9 0-5.5 1.6-6.7 4C2.3 8.4 0 10.9 0 14c0 3.3 2.7 6 6 6h13c2.8 0 5-2.2 5-5 0-2.6-2-4.8-4.6-5z"/></svg>Ёмон ҳаво</div>
                <div class="opt-box"><svg viewBox="0 0 24 24"><path d="M7 18c-1.1 0-1.99.9-1.99 2S5.9 22 7 22s2-.9 2-2-.9-2-2-2zM1 2v2h2l3.6 7.59-1.35 2.45c-.16.28-.25.61-.25.96 0 1.1.9 2 2 2h12v-2H7.42c-.14 0-.25-.11-.25-.25l.03-.12.9-1.63h7.45c.75 0 1.41-.41 1.75-1.03l3.58-6.49c.08-.14.12-.31.12-.48 0-.55-.45-1-1-1H5.21l-.94-2H1zm16 16c-1.1 0-1.99.9-1.99 2s.89 2 1.99 2 2-.9 2-2-.9-2-2-2z"/></svg>Етказма</div>
            </div>

            <div class="stats-container">
                <div class="stat-box">
                    <div class="stat-icon">
                        <svg viewBox="0 0 24 24"><path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10 10-4.5 10-10S17.5 2 12 2zm0 18c-4.4 0-8-3.6-8-8s3.6-8 8-8 8 3.6 8 8-3.6 8-8 8zm1-13h-2v6h6v-2h-4V7z"/></svg>
                    </div>
                    <div class="stat-info"><div class="stat-num" id="speed-display">0</div><div class="stat-unit">км...</div></div>
                </div>
                <div class="stat-box">
                    <div class="stat-icon">
                        <svg viewBox="0 0 24 24"><path d="M19 2H5c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-6 16h-2v-4h2v4zm0-6h-2V8h2v4z"/></svg>
                    </div>
                    <div class="stat-info"><div class="stat-num" id="distance-display">0,0</div><div class="stat-unit">км</div></div>
                </div>
                <div class="stat-box">
                    <div class="stat-icon">
                        <svg viewBox="0 0 24 24"><path d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zM12 20c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8zm.5-13H11v6l5.25 3.15.75-1.23-4.5-2.67z"/></svg>
                    </div>
                    <div class="stat-info"><div class="stat-num" id="wait-display">00:00</div><div class="stat-unit">...</div></div>
                </div>
                <div class="stat-box">
                    <div class="stat-icon">
                        <svg viewBox="0 0 24 24"><path d="M19.42 12.35L17 5.58a1 1 0 0 0-.94-.68H7.94a1 1 0 0 0-.94.68L4.58 12.35A2 2 0 0 0 4 13.5v5a1 1 0 0 0 1 1h1a1 1 0 0 0 1-1v-1h10v1a1 1 0 0 0 1 1h1a1 1 0 0 0 1-1v-5a2 2 0 0 0-.58-1.15zM7.5 15A1.5 1.5 0 1 1 9 13.5 1.5 1.5 0 0 1 7.5 15zm9 0a1.5 1.5 0 1 1 1.5-1.5 1.5 1.5 0 0 1-1.5 1.5z"/></svg>
                    </div>
                    <div class="stat-info"><div class="stat-num">0,0</div><div class="stat-unit">км</div></div>
                </div>
            </div>

            <button class="main-action-btn" id="action-btn">Boshlash</button>
        </div>

        <div class="loader-screen" id="loader-screen">
            <div class="circle-loader"></div>
            <div class="loader-text">Буюртма ёпилмоқда...</div>
        </div>
    </div>

    <script>
        const BASE_START_FARE = 20000;
        const COST_PER_KM = 4000;
        const COST_PER_MIN_WAIT = 2000;
        const WAIT_STEP_SECONDS = 20; // SUMMA ENDI HAR 20 SONIYADA O'ZGARADI

        let status = "IDLE"; 
        let currentFarePrice = 0;
        let driveDistanceKm = 0;
        let waitTimeSeconds = 0;

        let trackingInterval = null;
        let locationWatcher = null;
        let startLocation = null;

        const actionBtn = document.getElementById('action-btn');
        const fareText = document.getElementById('fare-text');
        const speedDisplay = document.getElementById('speed-display');
        const distanceDisplay = document.getElementById('distance-display');
        const waitDisplay = document.getElementById('wait-display');
        const loaderScreen = document.getElementById('loader-screen');
        const addressText = document.getElementById('address-text');
        const addressClickArea = document.getElementById('address-click-area');
        const headerStatusText = document.getElementById('header-status-text');

        // Manzilni qo'lda o'zgartirish
        addressClickArea.addEventListener('click', () => {
            let newAddress = prompt("Yangi manzilni kiriting:", addressText.textContent === "----" ? "" : addressText.textContent);
            if (newAddress !== null && newAddress.trim() !== "") {
                addressText.textContent = newAddress;
            }
        });

        actionBtn.addEventListener('click', () => {
            if (status === "IDLE") {
                startRideMode();
            } else if (status === "ACTIVE") {
                triggerFinishWithLoader();
            }
        });

        function startRideMode() {
            status = "ACTIVE";
            actionBtn.textContent = "БУЮРТМАНИ ЁПИШ";
            headerStatusText.textContent = "Жорий буюртма";

            currentFarePrice = BASE_START_FARE;
            driveDistanceKm = 0;
            waitTimeSeconds = 0;
            startLocation = null;
            
            refreshScreenUI();

            // GPS
            if (navigator.geolocation) {
                locationWatcher = navigator.geolocation.watchPosition(processGPSChange, processGPSError, {
                    enableHighAccuracy: true,
                    maximumAge: 0
                });
            }

            // Taymer
            trackingInterval = setInterval(() => {
                let currentSpeedKmH = startLocation && startLocation.coords.speed ? startLocation.coords.speed * 3.6 : 0;
                
                if (currentSpeedKmH < 2) { 
                    waitTimeSeconds++;
                    
                    // Har 20 soniyada pul qo'shiladi
                    if (waitTimeSeconds % WAIT_STEP_SECONDS === 0) {
                        // 20 soniya uchun pul: (2000 / 60) * 20 = 666.66 so'm
                        currentFarePrice += (COST_PER_MIN_WAIT / 60) * WAIT_STEP_SECONDS;
                    }
                }
                refreshScreenUI();
            }, 1000);
        }

        function triggerFinishWithLoader() {
            if (locationWatcher) navigator.geolocation.clearWatch(locationWatcher);
            if (trackingInterval) clearInterval(trackingInterval);

            loaderScreen.style.display = "flex";

            setTimeout(() => {
                loaderScreen.style.display = "none";
                status = "IDLE";
                actionBtn.textContent = "Boshlash";
                headerStatusText.textContent = "Бажарилди: 9/0/9";

                let finalRoundedPrice = Math.round(currentFarePrice / 100) * 100;
                alert(`Safar muvaffaqiyatli yakunlandi!\nUmumiy summa: ${finalRoundedPrice.toLocaleString('uz-UZ').replace(/,/g, ' ')} so'm`);
                
                currentFarePrice = 0;
                driveDistanceKm = 0;
                waitTimeSeconds = 0;
                
                fareText.textContent = "0";
                speedDisplay.textContent = "0";
                distanceDisplay.textContent = "0,0";
                waitDisplay.textContent = "00:00";
            }, 3000);
        }

        function processGPSChange(position) {
            if (status !== "ACTIVE") return;

            const currentCoords = position.coords;
            let currentSpeed = currentCoords.speed ? currentCoords.speed * 3.6 : 0;
            if (currentSpeed < 0) currentSpeed = 0;

            speedDisplay.textContent = Math.round(currentSpeed);

            if (startLocation) {
                const deltaDistance = calculateHaversine(startLocation.coords.latitude, startLocation.coords.longitude, currentCoords.latitude, currentCoords.longitude);
                
                if (currentSpeed >= 2 && deltaDistance > 0.002) {
                    driveDistanceKm += deltaDistance;
                    currentFarePrice += deltaDistance * COST_PER_KM;
                }
            }
            startLocation = position;
            refreshScreenUI();
        }

        function calculateHaversine(lat1, lon1, lat2, lon2) {
            const R = 6371;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                      Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                      Simple Math.sin(dLon/2) * Math.sin(dLon/2);
            return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
        }

        function processGPSError() { speedDisplay.textContent = "0"; }

        function convertToMinSec(seconds) {
            const m = Math.floor(seconds / 60).toString().padStart(2, '0');
            const s = (seconds % 60).toString().padStart(2, '0');
            return `${m}:${s}`;
        }

        function refreshScreenUI() {
            if (status === "ACTIVE") {
                // 100 birlikka yaxlitlash
                let roundedPrice = Math.round(currentFarePrice / 100) * 100;
                fareText.textContent = roundedPrice.toLocaleString('uz-UZ').replace(/,/g, ' ');
                distanceDisplay.textContent = driveDistanceKm.toFixed(1).replace('.', ',');
                waitDisplay.textContent = convertToMinSec(waitTimeSeconds);
            }
        }
    </script>
</body>
</html>
