<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Taksometr Tasvirli</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            user-select: none;
        }
        body {
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }
        
        /* Asosiy konteyner - rasm o'lchamida */
        .app-container {
            position: relative;
            width: 100%;
            max-width: 450px;
            height: 100vh;
            /* Yuqoridagi rasmni to'g'ridan-to'g'ri fon sifatida ishlatamiz */
            background-image: url('https://images.uz/api/v1/image/watermarked_img_832690602870483247.png'); 
            background-size: cover;
            background-position: center;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        /* 1 500 yoki 47 000 yashil raqamlar o'rni */
        .dynamic-fare {
            position: absolute;
            top: 49%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 82px;
            font-weight: 700;
            color: #61a665;
            letter-spacing: -2px;
            text-align: center;
            width: 100%;
            text-shadow: 0 0 2px rgba(255,255,255,0.8);
        }

        /* Dinamik ma'lumotlar paneli overlay */
        .stat-overlay {
            position: absolute;
            font-weight: bold;
            color: #111;
            font-size: 24px;
            background-color: #e8e8f0; /* Rasmdagi katakchalar rangi bilan yopish uchun */
            display: flex;
            align-items: center;
            white-space: nowrap;
        }
        
        /* 20 км... yozilgan joy */
        #speed-val { top: 78.4%; left: 17%; width: 28%; height: 4%; font-size: 23px; }
        /* 0,0 км (Masofa) */
        #dist-val { top: 78.4%; left: 70%; width: 25%; height: 4%; font-size: 23px; }
        /* 00:00... (Kutish vaqti) */
        #wait-val { top: 84.4%; left: 17%; width: 28%; height: 4%; font-size: 23px; }

        /* Pastdagi ko'k rangli tugma overlayi */
        .action-button {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 8.5%;
            background-color: #1976d2;
            color: white;
            font-size: 22px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border: none;
            outline: none;
        }
        .action-button:active {
            background-color: #1565c0;
        }
        .action-button.working {
            background-color: #d32f2f; /* Yakunlash rejimida qizilga aylanadi */
        }

        /* Yuklanish (Zagruzka) Effekti */
        .loader-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.8);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 999;
            color: white;
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid #f3f3f3;
            border-top: 5px solid #1976d2;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 15px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .loader-text {
            font-size: 18px;
            font-weight: 500;
        }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="dynamic-fare" id="fare-text">0</div>

        <div class="stat-overlay" id="speed-val">0 км/с</div>
        <div class="stat-overlay" id="dist-val">0,0 км</div>
        <div class="stat-overlay" id="wait-val">00:00</div>

        <button class="action-button" id="control-btn">Boshlash</button>

        <div class="loader-overlay" id="loader">
            <div class="spinner"></div>
            <div class="loader-text" id="loader-msg">Safar yakunlanmoqda...</div>
        </div>
    </div>

    <script>
        // Tarif parametrlari
        const START_PRICE = 20000; 
        const KM_PRICE = 4000;     
        const WAIT_PRICE_PER_MIN = 2000; 

        // Holat o'zgaruvchilari
        let appState = "STOPPED"; // STOPPED, RUNNING
        let currentFare = 0;
        let totalKm = 0;
        let waitSec = 0;
        
        let gpsWatcher = null;
        let mainTimer = null;
        let prevCoords = null;

        const controlBtn = document.getElementById('control-btn');
        const fareText = document.getElementById('fare-text');
        const speedVal = document.getElementById('speed-val');
        const distVal = document.getElementById('dist-val');
        const waitVal = document.getElementById('wait-val');
        const loader = document.getElementById('loader');

        // Boshlang'ich ekranni sozlash
        fareText.textContent = "0";

        controlBtn.addEventListener('click', () => {
            if (appState === "STOPPED") {
                startTrip();
            } else if (appState === "RUNNING") {
                endTripWithLoader();
            }
        });

        function startTrip() {
            appState = "RUNNING";
            controlBtn.textContent = "БУЮРТМАНИ ЁПИШ";
            controlBtn.classList.add('working');

            currentFare = START_PRICE;
            totalKm = 0;
            waitSec = 0;
            prevCoords = null;
            
            renderUI();

            // GPS yoqish
            if (navigator.geolocation) {
                gpsWatcher = navigator.geolocation.watchPosition(handleGPS, handleGPSError, {
                    enableHighAccuracy: true,
                    maximumAge: 0
                });
            }

            // Sekundomer (Kutish vaqtini hisoblash uchun)
            mainTimer = setInterval(() => {
                let currentSpeed = prevCoords && prevCoords.speed ? prevCoords.speed * 3.6 : 0;
                
                if (currentSpeed < 2) { // Agar tezlik 2 km/s dan past bo'lsa kutish hisoblanadi
                    waitSec++;
                    currentFare += (WAIT_PRICE_PER_MIN / 60);
                }
                renderUI();
            }, 1000);
        }

        // Zagruzka effekti bilan safarni yakunlash
        function endTripWithLoader() {
            // GPS va taymerni to'xtatish
            if (gpsWatcher) navigator.geolocation.clearWatch(gpsWatcher);
            if (mainTimer) clearInterval(mainTimer);

            // Zagruzkani ko'rsatish
            loader.style.display = "flex";
            
            // 3 sekunddan keyin ilovani boshlang'ich holatga qaytarish
            setTimeout(() => {
                loader.style.display = "none";
                appState = "STOPPED";
                controlBtn.textContent = "Boshlash";
                controlBtn.classList.remove('working');
                
                alert(`Safar yakunlandi!\nUmumiy hisob: ${Math.round(currentFare).toLocaleString('uz-UZ')} so'm`);
                
                currentFare = 0;
                totalKm = 0;
                waitSec = 0;
                renderUI();
                fareText.textContent = "0";
            }, 3000); // 3000 millisekund = 3 sekund kutish effekti
        }

        function handleGPS(pos) {
            if (appState !== "RUNNING") return;
            
            const coords = pos.coords;
            let speedKmH = coords.speed ? coords.speed * 3.6 : 0;
            if (speedKmH < 0) speedKmH = 0;
            
            speedVal.textContent = `${Math.round(speedKmH)} км...`;

            if (prevCoords) {
                const distanceDelta = getDistance(prevCoords.latitude, prevCoords.longitude, coords.latitude, coords.longitude);
                
                if (speedKmH >= 2 && distanceDelta > 0.002) {
                    totalKm += distanceDelta;
                    currentFare += distanceDelta * KM_PRICE;
                }
            }
            prevCoords = coords;
            renderUI();
        }

        function getDistance(lat1, lon1, lat2, lon2) {
            const R = 6371;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                      Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) *
                      Math.sin(dLon/2) * Math.sin(dLon/2);
            return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
        }

        function handleGPSError() {
            speedVal.textContent = "0 км...";
        }

        function formatTimer(seconds) {
            const m = Math.floor(seconds / 60).toString().padStart(2, '0');
            const s = (seconds % 60).toString().padStart(2, '0');
            return `${m}:${s}...`;
        }

        function renderUI() {
            // Yashil rangdagi asosiy hisob (M: 47 000 ko'rinishida oraliq qoldirib yozadi)
            fareText.textContent = Math.round(currentFare).toLocaleString('uz-UZ').replace(/,/g, ' ');
            distVal.textContent = `${totalKm.toFixed(1).replace('.', ',')} км`;
            waitVal.textContent = formatTimer(waitSec);
        }
    </script>
</body>
</html>
